<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>elecsy.shop — Link Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070709;
      --surface: #0f0f14;
      --border: #1e1e2e;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #555570;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(230,57,70,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 4px 14px;
      border-radius: 100px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      animation: underlineIn 0.5s ease 0.8s both;
    }

    .sub {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 1rem;
      font-family: 'Space Mono', monospace;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .domain-display {
      margin-top: 3rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .domain-display .dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s ease infinite;
    }

    .domain-display code {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      color: var(--text);
    }

    .domain-display code strong {
      color: var(--accent);
    }

    .admin-link {
      margin-top: 2rem;
      display: inline-block;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.2s;
      animation: fadeUp 0.6s ease 0.4s both;
    }
    .admin-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes underlineIn {
      to { transform: scaleX(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>

  <div class="container">
    <div class="badge">⚡ YouTube Link Shortener</div>
    <h1>elecsy<span>.shop</span></h1>
    <p class="sub">// ছোট link, বড় impact</p>

    <div class="domain-display">
      <div class="dot"></div>
      <code>elecsy.shop/<strong>video221</strong> → YouTube</code>
    </div>

    <br>
    <a href="/admin" class="admin-link">→ Admin Panel খোলো</a>
  </div>
</body>
</html>
